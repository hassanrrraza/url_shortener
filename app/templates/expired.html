<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Expired - URL Shortener</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="status-page">
    <div class="card status-card text-center">
        <div class="card-body">
            <div class="status-icon status-icon--warning" aria-hidden="true">
                <i class="fas fa-clock-rotate-left"></i>
            </div>
            <h1 class="card-title h2">This link has expired</h1>
            <p class="lead">The shortened URL is no longer active. Create a fresh short link to share your destination again.</p>
            <a href="/" class="btn btn-primary mt-2">
                <i class="fas fa-plus me-2" aria-hidden="true"></i>Create a new short URL
            </a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
